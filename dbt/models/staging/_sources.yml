version: 2

sources:
  - name: tpcds
    description: "TPC-DS SF100 retail benchmark data generated by DuckDB"
    schema: main
    tables:
      - name: store_sales
        description: "In-store point-of-sale transactions"
      - name: store_returns
        description: "In-store merchandise returns"
      - name: catalog_sales
        description: "Catalog/mail-order sales transactions"
      - name: catalog_returns
        description: "Catalog/mail-order returns"
      - name: web_sales
        description: "E-commerce web sales transactions"
      - name: web_returns
        description: "E-commerce web returns"
      - name: inventory
        description: "Daily store inventory snapshots by item and warehouse"
      - name: customer
        description: "Customer master data"
      - name: customer_address
        description: "Customer mailing addresses"
      - name: customer_demographics
        description: "Customer demographic attributes"
      - name: date_dim
        description: "Date dimension with calendar and fiscal attributes"
      - name: time_dim
        description: "Time-of-day dimension"
      - name: item
        description: "Product/item master data with categories and pricing"
      - name: promotion
        description: "Promotional campaigns and discount programs"
      - name: store
        description: "Physical retail store locations"
      - name: warehouse
        description: "Warehouse/distribution center locations"
      - name: call_center
        description: "Call center locations for catalog orders"
      - name: catalog_page
        description: "Catalog page metadata"
      - name: web_site
        description: "E-commerce website metadata"
      - name: web_page
        description: "Individual web page metadata"
      - name: household_demographics
        description: "Household demographic segments"
      - name: income_band
        description: "Income bracket reference data"
      - name: ship_mode
        description: "Shipping method reference data"
      - name: reason
        description: "Return reason codes"
