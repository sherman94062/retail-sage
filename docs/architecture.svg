<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="dbtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700" letter-spacing="2">RETAIL-SAGE</text>
  <text x="450" y="72" text-anchor="middle" fill="#94a3b8" font-size="13" letter-spacing="1">SEMANTIC ANALYTICS &amp; GOVERNED EXECUTION</text>

  <!-- Streamlit UI -->
  <rect x="60" y="92" width="780" height="70" rx="12" fill="url(#uiGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="450" y="122" text-anchor="middle" fill="#fff" font-size="18" font-weight="600">Streamlit Chat UI</text>
  <text x="450" y="146" text-anchor="middle" fill="#c7d2fe" font-size="12">Token/Cost Metrics  ·  SQL Viewer  ·  Live Progress  ·  Model Selector</text>

  <!-- Arrow -->
  <line x1="450" y1="162" x2="450" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Agent Orchestrator -->
  <rect x="120" y="180" width="660" height="70" rx="12" fill="url(#agentGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="450" y="210" text-anchor="middle" fill="#fff" font-size="18" font-weight="600">Agent Orchestrator</text>
  <text x="450" y="234" text-anchor="middle" fill="#ddd6fe" font-size="12">Multi-Turn Claude Tool Use Loop  ·  Haiku / Sonnet  ·  Memory-Augmented</text>

  <!-- Arrow -->
  <line x1="450" y1="250" x2="450" y2="272" stroke="#475569" stroke-width="2"/>

  <!-- Tools row -->
  <rect x="60" y="272" width="148" height="52" rx="8" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="134" y="303" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">execute_sql</text>

  <rect x="218" y="272" width="138" height="52" rx="8" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="287" y="303" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">get_schema</text>

  <rect x="366" y="272" width="148" height="52" rx="8" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="440" y="303" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">search_tables</text>

  <rect x="524" y="272" width="138" height="52" rx="8" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="593" y="303" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">get_history</text>

  <rect x="672" y="272" width="168" height="52" rx="8" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="756" y="303" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">list_tables</text>

  <!-- Arrows -->
  <line x1="300" y1="324" x2="300" y2="360" stroke="#475569" stroke-width="2"/>
  <line x1="600" y1="324" x2="600" y2="360" stroke="#475569" stroke-width="2"/>

  <!-- Data layer -->
  <rect x="60" y="360" width="380" height="80" rx="12" fill="url(#dataGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="250" y="394" text-anchor="middle" fill="#fff" font-size="17" font-weight="600">DuckDB</text>
  <text x="250" y="418" text-anchor="middle" fill="#fef3c7" font-size="12">TPC-DS  ·  24 Tables  ·  17M+ Rows  ·  Columnar</text>

  <rect x="460" y="360" width="380" height="80" rx="12" fill="#7c3aed" filter="url(#shadow)" opacity="0.9"/>
  <text x="650" y="394" text-anchor="middle" fill="#fff" font-size="17" font-weight="600">ChromaDB</text>
  <text x="650" y="418" text-anchor="middle" fill="#ddd6fe" font-size="12">Query History  ·  Table Descriptions  ·  Column Glossary</text>

  <!-- Arrow -->
  <line x1="450" y1="440" x2="450" y2="470" stroke="#475569" stroke-width="2"/>

  <!-- dbt + MetricFlow -->
  <rect x="60" y="470" width="780" height="80" rx="12" fill="url(#dbtGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="450" y="504" text-anchor="middle" fill="#fff" font-size="17" font-weight="600">dbt + MetricFlow</text>
  <text x="450" y="528" text-anchor="middle" fill="#a7f3d0" font-size="12">24 Staging → 4 Intermediate → 8 Marts  ·  4 Semantic Models  ·  15+ Metrics  ·  49 Tests</text>

  <!-- Bottom tagline -->
  <text x="450" y="585" text-anchor="middle" fill="#64748b" font-size="12" letter-spacing="0.5">Built with Claude · DuckDB · dbt · ChromaDB · Streamlit</text>
  <text x="450" y="605" text-anchor="middle" fill="#475569" font-size="11">github.com/sherman94062/retail-sage</text>
</svg>
